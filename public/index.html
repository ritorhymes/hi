<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050505" />
    <title>hi</title>
    <style>
      :root { color-scheme: dark; --bg:#050505; --surface:rgba(17,17,17,.72); --line:rgba(255,255,255,.14); --muted:#a7a7a7; --text:#fff; --danger:#ff8d8d; }
      * { box-sizing: border-box; }
      html, body { min-height:100%; margin:0; }
      body { background:var(--bg); color:var(--text); font-family:Arial,Helvetica,sans-serif; }
      button, input { font:inherit; }
      .stage { align-items:center; background:radial-gradient(circle at 50% 0%,rgba(255,255,255,.12),transparent 33rem),radial-gradient(circle at 100% 100%,rgba(88,80,255,.14),transparent 30rem),var(--bg); display:flex; justify-content:center; min-height:100dvh; padding:1.5rem; }
      .gate { background:var(--surface); border:1px solid var(--line); border-radius:1.5rem; box-shadow:0 2rem 7rem rgba(0,0,0,.55); max-width:39rem; overflow:hidden; padding:clamp(2rem,7vw,4rem); position:relative; text-align:center; width:100%; }
      .gate::before { background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent); content:""; height:1px; left:0; position:absolute; top:0; width:100%; }
      .eyebrow,.secret-label { color:var(--muted); font-size:.7rem; font-weight:700; letter-spacing:.16em; margin:0; text-transform:uppercase; }
      h1 { font-size:clamp(4rem,22vw,11rem); letter-spacing:-.09em; line-height:.82; margin:1.2rem 0 1.4rem; }
      .subtitle { color:var(--muted); font-size:clamp(1rem,2.8vw,1.15rem); line-height:1.5; margin:0 auto 2rem; max-width:26rem; }
      .unlock-form { margin:0 auto; max-width:31rem; text-align:left; }
      .unlock-form label { color:var(--muted); display:block; font-size:.82rem; margin:0 0 .55rem; }
      .input-row { display:flex; gap:.65rem; }
      input { background:rgba(0,0,0,.45); border:1px solid var(--line); border-radius:.8rem; color:var(--text); min-width:0; outline:none; padding:.85rem 1rem; transition:border-color 160ms ease,box-shadow 160ms ease; width:100%; }
      input:focus { border-color:rgba(255,255,255,.75); box-shadow:0 0 0 .2rem rgba(255,255,255,.12); }
      button { background:#fff; border:0; border-radius:.8rem; color:#080808; cursor:pointer; font-weight:750; padding:.85rem 1.15rem; transition:opacity 160ms ease,transform 160ms ease; }
      button:hover:not(:disabled) { transform:translateY(-1px); }
      button:disabled { cursor:wait; opacity:.58; }
      .error { color:var(--danger); font-size:.9rem; margin:.85rem 0 0; min-height:1.2rem; }
      .secret { animation:reveal 300ms ease-out; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.17); border-radius:1rem; margin-top:1rem; padding:1.5rem; }
      .secret p { font-size:clamp(1.1rem,3vw,1.5rem); line-height:1.55; margin:.8rem 0 1.3rem; overflow-wrap:anywhere; white-space:pre-wrap; }
      .secondary-button { background:transparent; border:1px solid var(--line); color:var(--text); }
      [hidden] { display:none !important; }
      @keyframes reveal { from { opacity:0; transform:translateY(.45rem); } to { opacity:1; transform:translateY(0); } }
      @media (max-width:30rem) { .gate { border-radius:1.15rem; } .input-row { flex-direction:column; } .input-row button { width:100%; } }
    </style>
  </head>
  <body>
    <main class="stage">
      <section class="gate" aria-labelledby="gate-title">
        <p class="eyebrow">private transmission</p>
        <h1 id="gate-title">hi</h1>
        <p class="subtitle">There is something on the other side.</p>

        <form class="unlock-form" id="unlock-form">
          <label for="password">password</label>
          <div class="input-row">
            <input autocomplete="current-password" id="password" placeholder="say the magic thing" required type="password" />
            <button id="unlock-button" type="submit">unlock</button>
          </div>
          <p class="error" id="error" role="alert"></p>
        </form>

        <div class="secret" hidden id="secret" role="status">
          <span class="secret-label">unlocked</span>
          <p id="secret-message"></p>
          <button class="secondary-button" id="relock" type="button">lock it again</button>
        </div>
      </section>
    </main>
    <script>
      const form = document.querySelector('#unlock-form');
      const password = document.querySelector('#password');
      const button = document.querySelector('#unlock-button');
      const error = document.querySelector('#error');
      const secret = document.querySelector('#secret');
      const secretMessage = document.querySelector('#secret-message');
      const relock = document.querySelector('#relock');

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        button.disabled = true;
        button.textContent = 'checking…';
        error.textContent = '';

        try {
          const response = await fetch('/api/unlock', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: password.value })
          });
          const result = await response.json();

          if (!response.ok || !result.message) {
            error.textContent = result.error || 'That did not open it.';
            return;
          }

          password.value = '';
          form.hidden = true;
          secretMessage.textContent = result.message;
          secret.hidden = false;
        } catch {
          error.textContent = 'The gate is not answering right now.';
        } finally {
          button.disabled = false;
          button.textContent = 'unlock';
        }
      });

      relock.addEventListener('click', () => {
        secret.hidden = true;
        secretMessage.textContent = '';
        form.hidden = false;
        password.focus();
      });
    </script>
  </body>
</html>
